<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quit_smoking_app</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>

<body>
    <div class="container">
        <h1></h1>

        <section class="input-group">
            <label for="quit-date-input">Quit Date</label>
            <input type="date" id="quit-date-input">
            <button id="start-btn">Let the quitting begin</button>
        </section>

        <br>

        <section class="timer-card">
            <p>❌❌❌</p>
            <div id="timer">00d 00h 00m 00s</div>
        </section>

        <section class="money-card">
            <p>💰💰💰</p>
            <div id="money-display">$0.00</div>
            <p id="vapes-avoided" style="font-size: 0.9rem; color: #666;">Vapes avoided: 0</p>
        </section>

        <button id="save-money-btn">$$$$</button>

        <button id="reset-btn" type="reset" class="danger-btn">reset</button>
    </div>
    <script src="app.js"></script>
</body>

</html>
